{% macro field_error(errors, name) -%}
    {% if errors and errors.get(name) %}
        <span class="field-error">{{ errors[name] }}</span>
    {% endif %}
{%- endmacro %}

{% macro input_value(form_data, name, default='') -%}
    {{ form_data.get(name, default) if form_data else default }}
{%- endmacro %}
